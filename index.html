<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Holistic Curriculum Matrix | Professional Institution</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f4f7fc;
            margin: 0;
            padding: 24px 16px;
            color: #1a2c3e;
        }

        .curriculum-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            padding: 20px 20px 30px 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e466e, #2c6e9e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #4a627a;
            border-left: 4px solid #2c7da0;
            padding-left: 16px;
            margin: 8px 0 24px 0;
            font-weight: 400;
            font-size: 0.95rem;
        }

        /* filter bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            background: #f0f4f9;
            padding: 16px 20px;
            border-radius: 60px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c5a7a;
        }

        select {
            background: white;
            border: 1px solid #cbdde9;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #0a2b3e;
            cursor: pointer;
            transition: 0.2s;
            outline: none;
        }

        select:hover {
            border-color: #2c7da0;
        }

        .reset-btn {
            background: #e9eef3;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #2c5a7a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 22px;
        }

        .reset-btn:hover {
            background: #d4e0ea;
            color: #0f3b4f;
        }

        /* table wrapper - horizontal scroll on mobile */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2edf2;
            background: white;
        }

        .curriculum-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 780px;
        }

        .curriculum-table th {
            background: #1e3b4f;
            color: white;
            padding: 14px 12px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            border-right: 1px solid #2f5e7a;
        }

        .curriculum-table th:last-child {
            border-right: none;
        }

        .curriculum-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #e6edf2;
            vertical-align: top;
            background-color: #ffffff;
        }

        .curriculum-table tr:hover td {
            background-color: #f9fdfe;
        }

        .day-cell {
            font-weight: 700;
            background-color: #f8fbfd;
            color: #1e466e;
            width: 100px;
            text-align: center;
            border-right: 1px solid #e2edf2;
        }

        .grade-cell {
            font-weight: 600;
            background-color: #fafcfd;
            text-align: center;
            white-space: nowrap;
        }

        .activity {
            font-size: 0.82rem;
            line-height: 1.45;
        }

        .activity strong {
            color: #1f6392;
            font-weight: 600;
            display: inline-block;
            min-width: 70px;
        }

        .activity-item {
            margin-bottom: 8px;
        }

        .badge-domain {
            display: inline-block;
            background: #eef2fa;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            color: #2c5a7a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            font-size: 1rem;
            color: #6b8faa;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #6c8eaa;
            border-top: 1px solid #e0ecf2;
            padding-top: 18px;
        }
    </style>
</head>
<body>
<div class="curriculum-container">

    <div class="filter-bar">

            <label>📅 Filter by Day</label>
            <select id="dayFilter">

                <option value="Thursday">Thursday – Social & Communication</option>
                <option value="Friday">Friday – Practical Life</option>
                <option value="Saturday">Saturday – Creative & Entrepreneurship</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🎓 Filter by Grade</label>
            <select id="gradeFilter">
                <option value="all">All grades</option>
                <option value="Nursery">Nursery</option>
                <option value="LKG">LKG</option>
                <option value="UKG">UKG</option>
                <option value="Grade 1">Grade 1</option>
                <option value="Grade 2">Grade 2</option>
                <option value="Grade 3">Grade 3</option>
                <option value="Grade 4">Grade 4</option>
                <option value="Grade 5">Grade 5</option>
                <option value="Grade 6">Grade 6</option>
                <option value="Grade 7">Grade 7</option>

        </div>
        <button class="reset-btn" id="resetFilters">⟳ Reset filters</button>

    <div class="table-wrapper">

            </thead>
            <tbody id="tableBody">
                <!-- dynamic rows from JS -->
            </tbody>
        </table>
    </div>
    <footer>Professional Academic Design | Vertical Alignment | 21st Century Skills (C/CT/CR/CM)</footer>
</div>

        // SATURDAY - Creative & Life Skills / Entrepreneurship
        { day: "Saturday", grade: "Nursery", activityA: "🎨 Finger painting (paper plate)", activityB: "🌀 Clay rolling (snake, ball)" },
        { day: "Saturday", grade: "LKG", activityA: "🖐️ Paper handprint turkey/flower", activityB: "🧽 Sponge stamping (watercolor)" },
        { day: "Saturday", grade: "UKG", activityA: "📄 Paper tearing collage (face)", activityB: "🏁 World flag coloring (choice)" },
        { day: "Saturday", grade: "Grade 1", activityA: "🪴 Pot decoration (stickers/dots)", activityB: "🔖 DIY bookmark with tassel" },
        { day: "Saturday", grade: "Grade 2", activityA: "♻️ Recycled bottle pen stand", activityB: "🌸 Origami paper flower" },
        { day: "Saturday", grade: "Grade 3", activityA: "🐦 Milk carton bird feeder", activityB: "🌱 Seed planting (decorated cup)" },
        { day: "Saturday", grade: "Grade 4", activityA: "💿 Best out of waste: CD to clock", activityB: "📰 Newspaper paper bag" },
        { day: "Saturday", grade: "Grade 5", activityA: "🌿 Plant sapling (painted pot)", activityB: "🏮 Tin can lantern" },
        { day: "Saturday", grade: "Grade 6", activityA: "🍄 Mini cement mushroom (safe mold)", activityB: "🧶 Rope wall hanging" },
        { day: "Saturday", grade: "Grade 7", activityA: "🛒 Entrepreneurship stall (sell crafts)", activityB: "🌱 Plastic bottle planter" },
        { day: "Saturday", grade: "Grade 8", activityA: "📊 Business stall (P&L calculation)", activityB: "🏙️ Sustainable city model (cardboard)" }

    // references
    const tbody = document.getElementById("tableBody");
    const dayFilter = document.getElementById("dayFilter");
    const gradeFilter = document.getElementById("gradeFilter");
    const resetBtn = document.getElementById("resetFilters");

    function renderTable() {
        const selectedDay = dayFilter.value;
        const selectedGrade = gradeFilter.value;
        
        const filtered = curriculumData.filter(row => {
            const matchDay = selectedDay === "all" || row.day === selectedDay;
            const matchGrade = selectedGrade === "all" || row.grade === selectedGrade;
            return matchDay && matchGrade;
        });
        
        if(filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="no-results">✨ No matching activities. Adjust filters to see the full curriculum. ✨</td></tr>`;
            return;
        }
        
        let html = "";
        for(let item of filtered) {
            html += `<tr>
                        <td class="day-cell">${item.day}</td>
                        <td class="grade-cell">${item.grade}</td>
                        <td class="activity"><div class="activity-item"><strong>🎯 A:</strong> ${item.activityA}</div></td>
                        <td class="activity"><div class="activity-item"><strong>🤝 B:</strong> ${item.activityB}</div></td>
                     </tr>`;
        }
        tbody.innerHTML = html;
    }
    
    function resetFilters() {
        dayFilter.value = "all";
        gradeFilter.value = "all";
        renderTable();
    }
    
    dayFilter.addEventListener("change", renderTable);
    gradeFilter.addEventListener("change", renderTable);
    resetBtn.addEventListener("click", resetFilters);
    
    // initial render
    renderTable();
</script>
</body>
</html>
